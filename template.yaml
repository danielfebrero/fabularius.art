AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: pornspot.ai - Minimalist Gallery

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name

  DomainName:
    Type: String
    Default: pornspot.ai
    Description: Domain name for the application

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 256
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        DYNAMODB_TABLE: !Ref MediaTable
        S3_BUCKET: !Ref MediaBucket
        CLOUDFRONT_DOMAIN: !Sub "https://${CloudFrontDistribution.DomainName}"
        DATABASE_TABLE_NAME: !Ref MediaTable
        FRONTEND_BASE_URL: !Sub
          - "https://${DomainPrefix}${DomainName}"
          - DomainPrefix: !If [IsProduction, "www.", !Sub "${Environment}."]
        FROM_EMAIL: !Sub "noreply@${DomainName}"
        FROM_NAME: "PornSpot.ai"
        GOOGLE_CLIENT_ID: !Sub "{{resolve:ssm:/${Environment}/google-client-id}}"
        GOOGLE_REDIRECT_URI: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/auth/oauth/callback"

Resources:
  # DynamoDB Table - Single table design
  MediaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Environment}-pornspot-media"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # S3 Bucket for media storage
  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Environment}-pornspot-media-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - POST
              - DELETE
            AllowedOrigins:
              - http://localhost:3000
              - !Sub "https://dev.${DomainName}"
              - !Sub "https://staging.${DomainName}"
              - !Sub "https://www.${DomainName}"
              - !Sub "https://${DomainName}"
              - "https://*.vercel.app"
              - "https://*.pornspot.ai"
              - "https://pornspot-ai-frontend.vercel.app"
            MaxAge: 3000
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
            AllowedOrigins:
              - "*"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # CloudFront Origin Access Control
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${Environment}-pornspot-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt MediaBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref OriginAccessControl
        Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingOptimized
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # S3 Bucket Policy for CloudFront
  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${MediaBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # Explicit API Gateway to avoid circular dependencies
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${Environment}-pornspot-api"
      Description: PornSpot.ai API
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Deployment
  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GetAlbumsMethod
      - CreateAlbumMethod
      - AdminLoginMethod
      - AdminLogoutMethod
      - AdminMeMethod
    Properties:
      RestApiId: !Ref ApiGateway

  # API Gateway Stage
  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: !Ref Environment
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiGatewayDeployment

  # API Gateway Resources
  AlbumsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: albums

  AdminResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: admin

  # API Gateway Methods
  GetAlbumsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref AlbumsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetAlbumsFunction.Arn}/invocations"

  CreateAlbumMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref AlbumsResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateAlbumFunction.Arn}/invocations"

  AdminLoginMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref AdminResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AdminLoginFunction.Arn}/invocations"

  AdminLogoutMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref AdminResource
      HttpMethod: DELETE
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AdminLogoutFunction.Arn}/invocations"

  AdminMeMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref AdminResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AdminMeFunction.Arn}/invocations"

  # Lambda Permissions
  GetAlbumsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetAlbumsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*/*"

  CreateAlbumPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateAlbumFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*/*"

  AdminLoginPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AdminLoginFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*/*"

  AdminLogoutPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AdminLogoutFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*/*"

  AdminMePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AdminMeFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*/*"

  # Lambda Functions
  GetAlbumsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-get-albums"
      CodeUri: backend/
      Handler: dist/functions/albums/get.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable

  CreateAlbumFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-create-album"
      CodeUri: backend/
      Handler: dist/functions/albums/create.handler

      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Environment}/revalidate-secret"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Environment}/frontend-url"

  GetAlbumFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-get-album"
      CodeUri: backend/
      Handler: dist/functions/albums/getById.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable

  UploadMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-upload-media"
      CodeUri: backend/
      Handler: dist/functions/media/upload.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable
        - S3WritePolicy:
            BucketName: !Ref MediaBucket

  GetMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-get-media"
      CodeUri: backend/
      Handler: dist/functions/media/get.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable

  # Admin Authentication Functions
  AdminLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-admin-login"
      CodeUri: backend/
      Handler: dist/functions/admin/auth/login.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable

  AdminLogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-admin-logout"
      CodeUri: backend/
      Handler: dist/functions/admin/auth/logout.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable

  AdminMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-admin-me"
      CodeUri: backend/
      Handler: dist/functions/admin/auth/me.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable

  # Admin Album Management Functions
  AdminUpdateAlbumFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-admin-update-album"
      CodeUri: backend/
      Handler: dist/functions/admin/albums/update.handler
      MemorySize: 1024
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable
        - S3ReadPolicy:
            BucketName: !Ref MediaBucket
        - S3WritePolicy:
            BucketName: !Ref MediaBucket

  AdminDeleteAlbumFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-admin-delete-album"
      CodeUri: backend/
      Handler: dist/functions/admin/albums/delete.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt MediaTable.Arn
                - !Sub "${MediaTable.Arn}/index/*"

  AdminListAlbumsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-admin-list-albums"
      CodeUri: backend/
      Handler: dist/functions/admin/albums/list.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable

  AdminDeleteMediaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-admin-delete-media"
      CodeUri: backend/
      Handler: dist/functions/admin/media/delete.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable
        - S3WritePolicy:
            BucketName: !Ref MediaBucket
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
                - dynamodb:UpdateItem
              Resource: !GetAtt MediaTable.Arn
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${MediaBucket}/*"
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${MediaBucket}/*"

  AdminStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-admin-stats"
      CodeUri: backend/
      Handler: dist/functions/admin/stats.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - S3ReadPolicy:
            BucketName: !Ref MediaBucket

  # User Authentication Functions
  UserRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-register"
      CodeUri: backend/
      Handler: dist/functions/user/auth/register.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"

  UserLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-login"
      CodeUri: backend/
      Handler: dist/functions/user/auth/login.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable

  UserLogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-logout"
      CodeUri: backend/
      Handler: dist/functions/user/auth/logout.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable

  UserMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-me"
      CodeUri: backend/
      Handler: dist/functions/user/auth/me.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable

  UserVerifyEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-verify-email"
      CodeUri: backend/
      Handler: dist/functions/user/auth/verify-email.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable

  UserResendVerificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-resend-verification"
      CodeUri: backend/
      Handler: dist/functions/user/auth/resend-verification.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"

  UserOAuthGoogleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-oauth-google"
      CodeUri: backend/
      Handler: dist/functions/user/auth/oauth-google.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"

  # User Interaction Functions
  UserLikeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-like"
      CodeUri: backend/
      Handler: dist/functions/user/interactions/like.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable

  UserBookmarkFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-bookmark"
      CodeUri: backend/
      Handler: dist/functions/user/interactions/bookmark.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable
        - DynamoDBWritePolicy:
            TableName: !Ref MediaTable

  UserGetLikesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-get-likes"
      CodeUri: backend/
      Handler: dist/functions/user/interactions/get-likes.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable

  UserGetBookmarksFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-pornspot-user-get-bookmarks"
      CodeUri: backend/
      Handler: dist/functions/user/interactions/get-bookmarks.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MediaTable

Outputs:
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${ApiGatewayStage}"
    Export:
      Name: !Sub "${Environment}-pornspot-api-url"

  CloudFrontUrl:
    Description: CloudFront distribution URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${Environment}-pornspot-cloudfront-url"

  MediaBucketName:
    Description: S3 bucket name for media storage
    Value: !Ref MediaBucket
    Export:
      Name: !Sub "${Environment}-pornspot-media-bucket"

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref MediaTable
    Export:
      Name: !Sub "${Environment}-pornspot-dynamodb-table"
